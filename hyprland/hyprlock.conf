$font = HackGen Console NF

general {
    hide_cursor = true
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper.jpg
    blur_passes = 0
    brightness = 0.82
    contrast = 1.0
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 100
    font_family = $font
    color = rgba(229, 128, 158, 0.28)
    position = 3, 116
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 96
    font_family = $font
    color = rgba(255, 255, 255, 0.96)
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 20
    font_family = $font
    color = rgba(244, 217, 225, 0.84)
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 18
    font_family = $font
    color = rgba(255, 255, 255, 0.55)
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 25%, 60
    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.25
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.30)
    outer_color = rgba(255, 255, 255, 0.22)
    font_color = rgb(255, 255, 255)
    font_family = $font
    placeholder_text = Password...
    hide_input = false
    rounding = 14
    check_color = rgba(229, 128, 158, 0.90)
    fail_color = rgba(219, 75, 75, 0.90)
    position = 0, -70
    halign = center
    valign = center
}
