# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# HDMI-A-1 (secondary monitor, left side)
monitor=HDMI-A-1,2560x1080@60,0x360,1
# DP-1 (main Acer monitor, right side) - basic config
monitor=DP-1,2560x1440@144,2560x0,1
# DP-2 (top monitor, same as DP-1)
monitor=DP-2,2560x1440@144,2560x-1440,1

# Monitor color calibration
#monitor=DP-1,transform,0
#monitor=HDMI-A-1,transform,0
# Disable virtual displays that might interfere
monitor=WAYLAND-1,disable

# HDR settings removed due to login issues


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = swww-daemon &
exec-once = swww img ~/Pictures/wallpaper.jpg --transition-type simple || swaybg -i ~/Pictures/wallpaper.jpg -m fill &
exec-once = udiskie &
exec-once = blueman-applet &


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,Breeze
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Breeze
env = HYPRCURSOR_SIZE,24

# Gaming/GPU environment variables for AMD
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,radeonsi
env = WLR_RENDERER,vulkan
env = __GLX_VENDOR_LIBRARY_NAME,mesa

# Fix game resolution detection issues
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Force proper resolution detection
env = WLR_DRM_DEVICES,/dev/dri/card0
env = SDL_VIDEO_MINIMIZE_ON_FOCUS_LOSS,0
env = SDL_VIDEO_FULLSCREEN_DISPLAY,0

# Force X11 for games only - waybar needs Wayland
# env = SDL_VIDEODRIVER,x11
# env = GDK_BACKEND,x11
# env = QT_QPA_PLATFORM,xcb

# Disable scaling for games
env = WINE_FULLSCREEN_FSR,0
env = WINE_FULLSCREEN_INTEGER_SCALING,1

# Color management
env = WLR_DRM_NO_ATOMIC,1
env = WLR_USE_LIBINPUT,1


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Disable anime mascot wallpapers
    disable_hyprland_logo = true # Disable random hyprland logo
    new_window_takes_over_fullscreen = 2 # Prevent extra workspace creation
}

# Render settings for better color accuracy
render {
    direct_scanout = false
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# Note: workspace_swipe option removed in newer Hyprland versions
gestures {
    # workspace_swipe is now controlled via touchpad settings
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, X, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglesplit, # dwindle
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, zen-twilight
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, F, togglefloating,
bind = $mainMod, N, fullscreen,
bind = $mainMod, space, togglefloating,

# Screenshot bindings
bind = ALT, C, exec, hyprshot -m region -o /home/micqdf/Pictures/hyprshots

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Workspace assignments
# Pin workspaces 1 and 2 to the secondary monitor (HDMI-A-1)
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1

# Pin workspaces 3 and 4 to the main monitor (DP-1)
workspace = 3, monitor:DP-1, default:true
workspace = 4, monitor:DP-1

# Pin workspace 10 to the top monitor (DP-2)
workspace = 10, monitor:DP-2, default:true

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Gaming window rules to help with resolution detection
windowrulev2 = fullscreen,class:^(steam_app_.*)$
windowrulev2 = fullscreen,class:^(lutris)$
windowrulev2 = fullscreen,class:^(heroic)$

# Force games to use primary monitor and proper resolution
windowrulev2 = monitor 0,class:^(steam_app_.*)$
windowrulev2 = size 2560 1440,class:^(steam_app_.*)$
windowrulev2 = center,class:^(steam_app_.*)$

#windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# Arma Reforger - keep running when unfocused
windowrulev2 = immediate, class:^(steam_app_1874880)$
windowrulev2 = fullscreen, class:^(steam_app_1874880)$
windowrulev2 = allowsinput, class:^(steam_app_1874880)$
