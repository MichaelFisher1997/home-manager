
[env]
TERM = "xterm-256color"

[terminal.shell]
program = "zellij"

[window]
padding.x = 10
padding.y = 10

decorations = "Full"
decorations_theme_variant = "Dark" # "Dark"
opacity = 0.8

[colors.primary]
background = "#000000"

[font]
size = 10.0

[font.bold]
family = "monospace"
style = "Bold"

[font.bold_italic]
family = "monospace"
style = "Bold Italic"

[font.italic]
family = "monospace"
style = "Italic"

[font.normal]
family = "monospace"
style = "Regular"

[general]
live_config_reload = true
working_directory = "None"

[terminal]

